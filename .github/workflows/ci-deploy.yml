name: CI + Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Smoke checks
        run: npm run smoke

  deploy-hook:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Resolve deploy hook
        id: hook
        run: |
          HOOK="${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          if [ -z "$HOOK" ]; then HOOK="${{ secrets.RENDER_DEPLOY_HOOK }}"; fi
          echo "hook=$HOOK" >> "$GITHUB_OUTPUT"

      - name: Trigger Render deploy hook
        if: ${{ steps.hook.outputs.hook != '' }}
        run: |
          curl -fsS -X POST "${{ steps.hook.outputs.hook }}"
          echo "Render deploy hook triggered."

      - name: No deploy hook configured
        if: ${{ steps.hook.outputs.hook == '' }}
        run: echo "Set RENDER_DEPLOY_HOOK_URL (or RENDER_DEPLOY_HOOK) in GitHub Actions secrets."
